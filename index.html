<!DOCTYPE html>
<html lang="pl">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title">Encyklopedia Kaustyk</title>
</head>
<body>
<div id="app">
  <header id="intro">
    <h1 data-i18n="intro.title"></h1>
    <p class="subtitle" data-i18n="intro.subtitle"></p>

    <div class="theory-placeholder">
      <section id="gallery" class="content-section">
        <h2 data-i18n="intro.galleryTitle"></h2>
        <div class="caustics-gallery">
          <div class="gallery-item"><img src="/assets/images/kaustyki-1.jpg" alt="Kaustyka 1"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-2.jpg" alt="Kaustyka 2"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-3.jpg" alt="Kaustyka 3"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-4.jpg" alt="Kaustyka 4"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-5.jpg" alt="Kaustyka 5"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-6.jpg" alt="Kaustyka 6"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-7.jpg" alt="Kaustyki 7"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-8.jpg" alt="Kaustyki 8"></div>
          <div class="gallery-item"><img src="/assets/images/kaustyki-9.jpg" alt="Kaustyki 9"></div>
        </div>
        <p style="font-size: 0.8rem; margin-top: 10px; color: #666;">
          <span data-i18n="intro.gallerySource"></span> <a href="https://nickyskye.blogspot.com/2016/05/webs-of-light-on-and-in-water.html" target="_blank">Nicky Skye</a>
        </p>
      </section>
    </div>

    <div class="theory-placeholder" style="border-left-color: #f1c40f;" data-i18n="intro.whatIsCaustic"></div>
  </header>

  <main>
    <section id="snell" class="content-section interactive">
      <h2 data-i18n="snell.title"></h2>
      <div class="theory-placeholder" data-i18n="snell.theory"></div>

      <div class="simulator-container">
        <div class="controls-panel">
          <h3 data-i18n="snell.controls.title"></h3>

          <div class="control-group">
            <label for="snell-angle">
              <span data-i18n="snell.controls.angle"></span>
              <span><span id="snell-angle-val">45</span>&deg;</span>
            </label>
            <input type="range" id="snell-angle" min="-85" max="85" value="45">
          </div>

          <div class="control-group">
            <label for="snell-ior1">
              <span data-i18n="snell.controls.ior1"></span>
              <span id="snell-ior1-val">1.00</span>
            </label>
            <input type="range" id="snell-ior1" min="1.0" max="2.5" step="0.01" value="1.00">
          </div>

          <div class="control-group">
            <label for="snell-ior2">
              <span data-i18n="snell.controls.ior2"></span>
              <span id="snell-ior2-val">1.52</span>
            </label>
            <input type="range" id="snell-ior2" min="1.0" max="2.5" step="0.01" value="1.52">
          </div>

          <table class="ior-table" style="margin-top: 15px; width: 100%; border-collapse: collapse; font-size: 0.85rem;">
            <thead><tr style="border-bottom: 1px solid #444;"><th style="text-align: left; padding: 5px;" data-i18n="snell.table.mat"></th><th style="text-align: right; padding: 5px;" data-i18n="snell.table.ior"></th></tr></thead>
            <tbody>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v1"></td><td style="text-align: right; padding: 3px 5px;">1.00</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v2"></td><td style="text-align: right; padding: 3px 5px;">1.31</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v3"></td><td style="text-align: right; padding: 3px 5px;">1.33</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v4"></td><td style="text-align: right; padding: 3px 5px;">1.52</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v5"></td><td style="text-align: right; padding: 3px 5px;">1.62</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="snell.table.v6"></td><td style="text-align: right; padding: 3px 5px;">2.42</td></tr>
            </tbody>
          </table>
        </div>
        <div class="canvas-panel">
          <canvas id="canvas-snell" width="800" height="500"></canvas>
        </div>
      </div>
      <div class="simulator-description" style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 0.9rem;">
        <h4 style="margin-top: 0; color: #4a90e2;" data-i18n="snell.descTitle"></h4>
        <div data-i18n="snell.descList"></div>
      </div>
    </section>

    <section id="spherical-aberration" class="content-section interactive">
      <h2 data-i18n="lens.title"></h2>
      <div class="theory-placeholder" data-i18n="lens.theory"></div>

      <div class="simulator-container">
        <div class="controls-panel">
          <h3 data-i18n="lens.controls.title"></h3>

          <div class="control-group">
            <label for="light-y">
              <span data-i18n="lens.controls.lightY"></span>
            </label>
            <input type="range" id="light-y" min="100" max="500" value="300">
          </div>

          <div class="control-group">
            <label for="ray-count">
              <span data-i18n="lens.controls.rayCount"></span>
              <span id="ray-count-val">15</span>
            </label>
            <input type="range" id="ray-count" min="15" max="500" value="15">
          </div>

          <div class="control-group">
            <label for="ior">
              <span data-i18n="lens.controls.ior"></span>
              <span id="ior-val">1.52</span>
            </label>
            <input type="range" id="ior" min="1.0" max="2.5" step="0.01" value="1.52">
          </div>

          <table class="ior-table" style="margin-top: 15px; width: 100%; border-collapse: collapse; font-size: 0.85rem;">
            <thead><tr style="border-bottom: 1px solid #444;"><th style="text-align: left; padding: 5px;" data-i18n="lens.table.mat"></th><th style="text-align: right; padding: 5px;" data-i18n="lens.table.ior"></th></tr></thead>
            <tbody>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v1"></td><td style="text-align: right; padding: 3px 5px;">1.00</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v2"></td><td style="text-align: right; padding: 3px 5px;">1.33</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v3"></td><td style="text-align: right; padding: 3px 5px;">1.47</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v4"></td><td style="text-align: right; padding: 3px 5px;">1.52</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v5"></td><td style="text-align: right; padding: 3px 5px;">1.77</td></tr>
            <tr><td style="padding: 3px 5px;" data-i18n="lens.table.v6"></td><td style="text-align: right; padding: 3px 5px;">2.42</td></tr>
            </tbody>
          </table>
        </div>

        <div class="canvas-panel">
          <canvas id="canvas-lens" width="800" height="600"></canvas>
        </div>
      </div>
      <div class="simulator-description" style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 0.9rem;">
        <h4 style="margin-top: 0; color: #4a90e2;" data-i18n="lens.descTitle"></h4>
        <div data-i18n="lens.descList"></div>
      </div>
    </section>

    <section id="reflection-caustic" class="content-section interactive">
      <h2 data-i18n="cup.title"></h2>
      <div class="theory-placeholder" data-i18n="cup.theory"></div>

      <div class="simulator-container">
        <div class="controls-panel">
          <h3 data-i18n="cup.controls.title"></h3>

          <div class="control-group">
            <label for="reflect-light-x">
              <span data-i18n="cup.controls.lightX"></span>
              <span id="reflect-light-x-val">250</span>
            </label>
            <input type="range" id="reflect-light-x" min="30" max="470" value="250">
          </div>

          <div class="control-group">
            <label for="reflect-ray-count">
              <span data-i18n="cup.controls.rayCount"></span>
              <span id="reflect-ray-count-val">5</span>
            </label>
            <input type="range" id="reflect-ray-count" min="5" max="1000" value="5">
          </div>

          <div class="theory-placeholder" style="font-size: 0.85rem; margin-top: 20px;" data-i18n="cup.tip"></div>
        </div>

        <div class="canvas-panel">
          <canvas id="canvas-cup" width="800" height="600"></canvas>
        </div>
      </div>
      <div class="simulator-description" style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 0.9rem;">
        <h4 style="margin-top: 0; color: #4a90e2;" data-i18n="cup.descTitle"></h4>
        <div data-i18n="cup.descList"></div>
      </div>
    </section>

    <section id="dispersion" class="content-section interactive">
      <h2 data-i18n="prism.title"></h2>
      <div class="theory-placeholder" data-i18n="prism.theory"></div>

      <div class="simulator-container">
        <div class="controls-panel">
          <h3 data-i18n="prism.controls.title"></h3>

          <div class="control-group">
            <label for="prism-ray-count">
              <span data-i18n="prism.controls.rayCount"></span>
              <span id="prism-ray-count-val">1</span>
            </label>
            <input type="range" id="prism-ray-count" min="1" max="300" value="1">
          </div>

          <div class="control-group">
            <label for="prism-angle">
              <span data-i18n="prism.controls.angle"></span>
            </label>
            <input type="range" id="prism-angle" min="-20" max="20" value="-5">
          </div>

          <div class="control-group">
            <label data-i18n="prism.controls.medium"></label>
            <p style="font-size: 0.85rem; color: #999; margin-top: 5px;" data-i18n="prism.controls.mediumDesc"></p>
          </div>

          <div class="theory-placeholder" style="font-size: 0.85rem; margin-top: 20px;" data-i18n="prism.tip"></div>
        </div>

        <div class="canvas-panel">
          <canvas id="canvas-prism" width="800" height="600"></canvas>
        </div>
      </div>
      <div class="simulator-description" style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 0.9rem;">
        <h4 style="margin-top: 0; color: #4a90e2;" data-i18n="prism.descTitle"></h4>
        <div data-i18n="prism.descList"></div>
      </div>
    </section>

    <section id="gpu-gallery" class="content-section">
      <h2 data-i18n="gpu.title"></h2>
      <div class="theory-placeholder" data-i18n="gpu.theory"></div>
      <div id="three-container" style="width: 100%; height: 500px; border-radius: 8px; overflow: hidden; background: #000;"></div>
    </section>
  </main>

  <footer style="text-align: center; color: #666; margin-top: 40px; font-size: 0.9rem;">
    <p data-i18n="footer"></p>
  </footer>
</div>

<script type="module" src="/src/main.js"></script>

<div id="lightbox" class="lightbox">
  <span class="close-lightbox">&times;</span>
  <img src="" alt="Powiększone zdjęcie" id="lightbox-img">
</div>
</body>
</html>
